    name: Magic Stealer (Rogue)
    type: subclass
    _id: PCI5D1Fj3UG2r7mL
    system:
      item: Compendium.UA2026-MysticSubclasses.classes.Item.uargeMagicSteale
      description:
        value: >-
          <p>@Embed[Compendium.UA2026-MysticSubclasses.content.JournalEntry.uaArtHandout0000.JournalEntryPage.Vx4VHnr4t2m2hS2v
          caption=false classes="three right"]</p><blockquote><p>Steal Magical
          Power to Empower Yourself</p></blockquote><p>While ordinary thieves
          are cutting purses and burgling homes, a
          @UUID[Compendium.UA2026-MysticSubclasses.classes.Item.uargeMagicSteale]{Magic
          Stealer} is after a much more valuable prize: magic. The Magic Stealer
          preys on spellcasters, repurposing their magic and eluding divination
          spells to take magical power at the point of a knife.</p>
