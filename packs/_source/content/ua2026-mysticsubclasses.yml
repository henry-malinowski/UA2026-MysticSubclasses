  - sort: 200000
    name: Oath of the Spellguard (Paladin)
    type: subclass
    _id: wC9v1ECQrKqVHY9C
    system:
      item: Compendium.UA2026-MysticSubclasses.classes.Item.uapdnSpellguard0
      description:
        value: >-
          <p>@Embed[Compendium.UA2026-MysticSubclasses.content.JournalEntry.uaArtHandout0000.JournalEntryPage.vTzGriPl7NUlWcWp
          caption=false classes="three right"]</p><blockquote><p>Protect Your
          Allies from Villainous Magic</p></blockquote><p>Paladins who take the
          @UUID[Compendium.UA2026-MysticSubclasses.classes.Item.uapdnSpellguard0]{Oath
          of the Spellguard} are sworn to battle those who use magic to harm
          others. They often serve as bodyguards to upstanding mages, but their
          most important role is protecting allies from devastating magical
          attacks. Those who swear this oath ensure that villains who misuse
          magic are brought to justice.</p><p>These paladins share the following
          tenets:</p><ul><li><p>Protect the innocent from wicked
          mages.</p></li><li><p>Prevent magic from falling into villains’
          hands.</p></li><li><p>Protect mages who use magic
          honorably.</p></li></ul>
