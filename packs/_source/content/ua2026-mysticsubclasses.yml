  - sort: 400000
    name: Vestige Patron (Warlock)
    type: subclass
    _id: WxaB0Fg3NGDOZcSO
    system:
      item: Compendium.UA2026-MysticSubclasses.classes.Item.uawlkVestigePatr
      description:
        value: >-
          <p>@Embed[Compendium.UA2026-MysticSubclasses.content.JournalEntry.uaArtHandout0000.JournalEntryPage.sPvTbk84X9iBl7kA
          caption=false classes="three right"]</p><blockquote><p><em>Wield the
          Remnants of a Dying God’s Power</em></p></blockquote><p>Your pact
          draws on the power of a dying god, a being once worshipped by
          countless followers but now abandoned and forgotten. This dying god,
          known as a
          @UUID[Compendium.UA2026-MysticSubclasses.classes.Item.uawlkVestigePatr]{vestige},
          might have been benevolent, evil, or strange and unknowable, but now
          it is driven to regain its former power. The vestige needs your help
          it is willing to share its remaining strength with you.</p>
