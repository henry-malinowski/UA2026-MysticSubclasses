  description:
    value: >-
      <p>You keep your magical power and martial focus in perfect balance,
      allowing you to convert spell slots into Focus Points, or convert Focus
      Points into spell slots.</p><p><strong>Converting Spell Slots to Focus
      Points.</strong> You can expend a spell slot to regain a number of
      expended Focus Points equal to the slot’s level (no action
      required).</p><p><strong>Recovering Spell Slots.</strong> As a Bonus
      Action, you can transform unexpended Focus Points to recover one expended
      spell slot. The Recovering Spell Slots table shows the cost of recovering
      a spell slot of a given level, and it lists the minimum Monk level you
      must be to recover a slot. You can recover a spell slot no higher than
      level 4.</p><table><caption>Recovering Spell
      Slots</caption><thead><tr><td>Spell Slot Level</td><td>Focus Point
      Cost</td><td>Min. Monk
      Level</td></tr></thead><tbody><tr><td>1</td><td>2</td><td>6</td></tr><tr><td>2</td><td>3</td><td>7</td></tr><tr><td>3</td><td>5</td><td>13</td></tr><tr><td>4</td><td>6</td><td>19</td></tr></tbody></table><section
      class="secret" id="secret-Y14NgV8GhzbNK7aj"><p><strong>Foundry
      Note</strong></p><p>The <strong>Regain Spell Slot</strong> activity will
      convert your Focus Points into spell slots.</p><p>The <strong>Regain Focus
      Points</strong> activity will convert your chosen spell slot into Focus
      Points.</p></section>
