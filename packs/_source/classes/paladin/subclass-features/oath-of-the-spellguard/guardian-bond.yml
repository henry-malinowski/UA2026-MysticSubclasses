  description:
    value: >-
      <p>As a Magic Action, you can expend one use of your Channel Divinity to
      forge a divine bond with a willing creature within 5 feet of yourself. The
      bond lasts for 1 hour or until you have the &amp;Reference[unconscious
      apply=false] condition. For the duration, while the bonded creature is
      within your reach and is hit by an attack roll, you can take a
      &amp;Reference[Reaction] to add your Charisma modifier (minimum of +1) to
      that creature’s AC, possibly causing the attack to miss.</p><p>You can end
      your divine bond at any time (no action required). If you already have a
      divine bond when you forge a new one, the previous bond ends.</p><section
      class="secret" id="secret-evFAPAnFiUoESSIZ"><p><strong>Foundry
      Note</strong></p><p>This feature includes an Active Effect for tracking
      the bond but does not automate prompting for a reaction or automatically
      end when you use this feature again.</p></section>
