  description:
    value: >-
      <p>As a Bonus Action, you can empower your
      @UUID[Compendium.dnd-players-handbook.classes.Item.phbpdnProtection]{Aura
      of Protection}, granting the benefits below for 1 minute or until you end
      them (no action required). Once you use this feature, you can’t use it
      again until you finish a &amp;Reference[Long Rest]. You can restore your
      use of this ability by expending a level 5 spell slot (no action
      required).</p><p><strong>Bodyguard.</strong> While the target of your
      Guardian Bond is in the aura, that creature has Resistance to all
      damage.</p><p><strong>Protection from Magic.</strong> You and your allies
      in the aura have Advantage on saving throws against
      spells.</p><p><strong>Spell Ward.</strong> Spell attack rolls against you
      and your allies in the aura have Disadvantage.</p>
