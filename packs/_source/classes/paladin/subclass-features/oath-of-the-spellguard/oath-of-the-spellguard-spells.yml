  description:
    value: >-
      <p>The magic of your oath ensures you always have certain spells ready;
      when you reach a Paladin level specified in the Oath of the Spellguard
      Spells table, you thereafter always have the listed spells
      prepared.</p><table><caption>Oath of Spellguard
      Spells</caption><thead><tr><td>Paladin
      Level</td><td>Spells</td></tr></thead><tbody><tr><td>3</td><td>@UUID[Compendium.dnd-players-handbook.spells.Item.phbsplDetectMagi]{Detect
