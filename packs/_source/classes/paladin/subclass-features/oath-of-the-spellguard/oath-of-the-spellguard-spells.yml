      @UUID[Compendium.dnd-players-handbook.spells.Item.phbsplDispelMagi]{Dispel
      Magic}</td></tr><tr><td>13</td><td>@UUID[Compendium.dnd-players-handbook.spells.Item.phbsplFreedomofM]{Freedom
