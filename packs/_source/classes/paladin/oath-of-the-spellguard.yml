  description:
    value: >-
      <blockquote><p><em>Protect Your Allies from Villainous
      Magic</em></p></blockquote><p>Paladins who take the Oath of the Spellguard
      are sworn to battle those who use magic to harm others. They often serve
      as bodyguards to upstanding mages, but their most important role is
      protecting allies from devastating magical attacks. Those who swear this
      oath ensure that villains who misuse magic are brought to
      justice.</p><p>These paladins share the following
      tenets:</p><ul><li><p>Protect the innocent from wicked
      mages.</p></li><li><p>Prevent magic from falling into villains’
      hands.</p></li><li><p>Protect mages who use magic honorably.</p></li></ul>
