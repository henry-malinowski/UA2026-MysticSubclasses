  description:
    value: >-
      <p>The vestige manifests, aiding you to do so and drawing strength from
      your pact. It uses the Vestige Companion stat block and is a
      @UUID[Compendium.UA2026-MysticSubclasses.actors.Actor.uaVestigeCelesti]{Celestial},
      @UUID[Compendium.UA2026-MysticSubclasses.actors.Actor.uaVestigeFiendis]{Fiend},
      or
      @UUID[Compendium.UA2026-MysticSubclasses.actors.Actor.uaVestigeUndead0]{Undead}
      (choose when you gain this feature). You determine what the vestige looks
      like, but regardless of its form, the vestige bears features indicating
      its supernatural origin. For example, you might decide your vestige is an
      oversize floating skull etched with sigils, a circle of glowing runes, or
      a constantly shifting abstract shape.</p><p>The vestige is Friendly to you
      and your allies and obeys your commands. It vanishes if you
      die.</p><p><strong>The Vestige in Combat.</strong> In combat, the vestige
      acts during your turn. It can move and use its Reaction on its own, but
      the only action it takes is the Dodge action unless you take a Bonus
      Action to command it to take an action in its stat block or some other
      action. You can also sacrifice one of your attacks when you take the
      Attack action to command the vestige to take the Vestige’s Strike action.
      If you have the Incapacitated condition, the vestige acts on its own and
      isn’t limited to the Dodge action.</p><p><strong>Disappearance of the
      Vestige.</strong> When the vestige drops to 0 Hit Points, it disappears.
      You can spend 1 minute performing a magic ceremony to manifest the vestige
      again; it reappears with its maximum Hit Points in an unoccupied space
      within 5 feet of you. As a Magic action, you can temporarily dismiss the
      vestige to a pocket dimension. As a Magic action while it is temporarily
      dismissed, you can cause the vestige to reappear in an unoccupied space
      within 30 feet of you. Whenever the vestige drops to 0 Hit Points or
      disappears into the pocket dimension, it leaves behind in its space
      anything it was wearing or carrying.</p><p>Whenever you finish a
      &amp;Reference[Long Rest], you can summon the vestige in a new form, which
      appears in an unoccupied space within 5 feet of you. You choose its
      appearance and whether it is a Celestial, Fiend, or Undead. If the vestige
      is already manifested from this feature, its form changes to the new
      one.</p><section class="fvtt advice"
      style="margin:0.5rem;padding:0.5rem"><article><p>In addition to the noted
      usage of your statistics in the companion's Traits and Actions, the
      following attributes are also
      affected.</p><table><caption>Common</caption><tbody><tr><td><strong>AC</strong></td><td>13
      plus your Charisma
      modifier</td></tr><tr><td><strong>PB</strong></td><td>equals your
      Proficiency Bonus</td></tr><tr><td><strong>HP</strong></td><td>4 plus four
      times your Warlock
      level</td></tr><tr><td><strong>HD</strong></td><td>[d6s] equal to your
      Warlock level</td></tr></tbody></table></article></section><section
      class="secret" id="secret-sukIH7PiyLbd7pAx"><p><strong>Foundry
      Note</strong></p><p>This feature will automatically prompt you to summon
      and choose a Vestige Companion when you complete a long rest.</p><p>The
      <strong>Resummon Vestige </strong>activity will allow you to manually
      summon a vestige but does not automate being committed to form chosen when
      completing a long rest.</p><p>The <strong>Command</strong> activity only
      needs to be used if you're tracking your Bonus Action usage.</p></section>
