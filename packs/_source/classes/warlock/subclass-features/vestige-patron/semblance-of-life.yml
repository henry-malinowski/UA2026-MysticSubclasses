  advancement: []
  description:
    value: >-
      <p>Your Vestige Companion continues to grow in strength, and with your
      assistance, it can briefly adopt a more powerful form. Depending on the
      vestige’s type, you can cast one of the following spells while the vestige
      is within 90 feet of you without expending a spell slot or needing
      Material components: <em>Summon Celestial</em> (Celestial vestige),
      <em>Summon Fiend</em> (Fiend vestige), or <em>Summon Undead</em> (Undead
      vestige). When you cast the spell with this feature, the vestige becomes
      the summoned creature. Its game statistics are replaced by the summoned
      creature’s stat block, the spell’s level is equal to half your Warlock
      level (round down; maximum level 9), and the spell’s duration is 1 minute.
      When the spell ends, the vestige returns to its previous form.</p><p>Once
      you have cast the spell in this way, you can’t do so again until you
      finish a Long Rest.</p><section class="secret"
      id="secret-vZalmDSCpVh4yzu3"><p><strong>Foundry Note</strong></p><p>This
      feature grants 3 cast activities. The level of the Summon spells
      automatically increases with your Warlock level.</p></section>
