  description:
    value: >-
      <p>Your Vestige Companion increases in magical strength. As a Magic
      Action, you can cause the vestige to manifest an aura in a 30-foot
      Emanation that originates from the vestige. The aura lasts a number of
      hours equal to your Charisma modifier or until the vestige disappears or
      is temporarily dismissed. You, the vestige, and your allies within the
      aura gain Resistance to Fire, Necrotic, and Radiant damage and have
      Immunity to the Charmed and Frightened conditions. Once you manifest this
      aura, you can’t do so again until you finish a Long Rest.</p><p>In
      addition, when you drop to 0 Hit Points while within the aura, you instead
      change your Hit Points to a number equal to your Warlock level plus your
      Charisma modifier. The vestige is then dismissed into a pocket dimension
      and can’t return until you finish a Long Rest.</p><section class="secret"
      id="secret-K29gcW4fqJnHlqhS"><p><strong>Foundry Note</strong></p><p>The
      <strong>Manifest Aura</strong> feature will allow you to place an
      Emanation template on your vestige companion. Resistance granted by this
      feature is not automated.</p><p>The <strong>Sacrifice Vestige
      </strong>activity will heal you by an appropriate amount but does not
      automatically dismiss your vestige companion or prevent resummoning
      them.</p></section>
