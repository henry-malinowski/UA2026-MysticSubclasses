  description:
    value: >-
      <p>The magic of your Vestige Companion ensures you always have certain
      spells ready. Select one of the following Cleric Domains: Life, Light,
      Trickery, or War. The Domain Spells of your chosen Domain are Warlock
      spells for you. When you reach a Warlock level equal to a Cleric Level
      listed on the Domain Spells table for the Domain you have chosen, you
      thereafter always have the listed spells prepared.</p><p>For example, if
      you chose the War Domain for this feature, when you reach Warlock level 3,
      you would have the <em>Guiding Bolt</em>, <em>Magic Weapon</em>,
      <em>Shield of Faith</em>, and <em>Spiritual Weapon</em> spells
      prepared.</p><section class="secret"
      id="secret-VDKPcZTRxa30WO9q"><p><strong>Foundry Note</strong></p><p>This
      feature grants you a choice of a Cleric Domain spell list, which will be
      added as another feature to grant you that lists spell automatically as
      you gain Warlock levels.</p></section>
