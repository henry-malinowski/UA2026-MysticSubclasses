  description:
    value: >-
      <blockquote><p><em>Wield the Remnants of a Dying God’s
      Power</em></p></blockquote><p>Your pact draws on the power of a dying god,
      a being once worshipped by countless followers but now abandoned and
      forgotten. This dying god, known as a vestige, might have been benevolent,
      evil, or strange and unknowable, but now it is driven to regain its former
      power. The vestige needs your help it is willing to share its remaining
      strength with you.</p>
