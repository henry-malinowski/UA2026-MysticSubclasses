  description:
    value: >-
      <p>Immediately after a creature you can see within 30 feet of you casts a
      level 1+ spell, you can take a Reaction to absorb magical energy from the
      spell. When you do so, until the end of your next turn, the next time you
      hit with your Sneak Attack you deal extra Force damage. To determine the
      extra damage, roll a number of d6s equal to the spell’s level, and add
      them together.</p><p>You can take this Reaction a number of times equal to
      your Intelligence modifier (minimum of once), and you regain all expended
      uses when you finish a Long Rest.</p><section class="secret"
      id="secret-EKKHqruZyH8NdBEa"><p><strong>Foundry Note</strong></p><p>The
      <strong>Roll Extra Damage</strong> activity presents a scaling damage
      dialog in which you select the level of the spell you absorbed magic
      from.</p></section>
