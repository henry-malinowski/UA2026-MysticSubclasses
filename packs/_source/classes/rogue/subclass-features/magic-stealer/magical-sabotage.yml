  description:
    value: >-
      <p>You gain the following
      @UUID[Compendium.dnd-players-handbook.classes.Item.phbrgeCunningStr]{Cunning
      Strike} options.</p><p><strong>Spell Susceptibility (Cost: 2d6).</strong>
      The target has Disadvantage on the next saving throw it makes against a
      spell until the start of your next turn.</p><p><strong>Disrupt Spell
      (Cost: 3d6).</strong> The target’s magical acuity is disrupted until the
      start of your next turn. Whenever the target casts a spell during that
      time, it must succeed on an Intelligence saving throw or the spell
      dissipates with no effect, and the action, Bonus Action, or Reaction used
      to cast it is wasted. If that spell was cast with a spell slot, the slot
      isn’t expended.</p><p><strong>Steal Resistance (Cost: 2d6).</strong>
      Choose one kind of damage. If the target has Resistance to that kind of
      damage, until the start of your next turn, the target loses that
      Resistance and you gain Resistance to that damage type.</p><section
      class="secret" id="secret-T2A1qBm93zgualMb"><p><strong>Foundry
      Note</strong></p><p>This feature contains 3 active effects that can be
      applied for tracking the cunning strike used but their application is not
      automated.</p></section>
