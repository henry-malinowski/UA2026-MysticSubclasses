  description:
    value: >-
      <p>You can drain power from ongoing spells to recharge your allies’ magic.
      As a Magic Action, you can touch a willing creature and end one ongoing
      level 1 or level 2 spell on it; the creature immediately recovers one
      expended spell slot of level 2 or lower (the target’s choice).</p><p>Once
      you use this feature, you can’t do so again until you finish a Short or
      Long Rest.</p><section class="secret"
      id="secret-gwD42IsVRlMQdAwq"><p><strong>Foundry
      Note</strong></p><p>Regaining of spell slots with this feature is not
      automated. Spell slots must be restored manually by the willing
      creature.</p><p>This feature will automatically change to a bonus action
      when you gain Improved Drain Magic.</p></section>
